name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "## What's Changed" > CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md

          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges >> CHANGELOG_BODY.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges -20 >> CHANGELOG_BODY.md
          fi

          echo "" >> CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md
          echo "**Full Changelog**: https://github.com/kill136/claude-code-open/compare/${PREV_TAG}...${CURRENT_TAG}" >> CHANGELOG_BODY.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_BODY.md
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            install.bat
            install.ps1

  build-packages:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            artifact: axon-windows-x64
            shell: pwsh
          - os: ubuntu-latest
            label: Linux x64
            artifact: axon-linux-x64
            shell: bash
          - os: macos-14
            label: macOS x64 (Intel)
            artifact: axon-macos-x64
            shell: bash
          - os: macos-latest
            label: macOS arm64 (Apple Silicon)
            artifact: axon-macos-arm64
            shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      # Linux: install native build dependencies
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install all dependencies (for build)
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Reinstall production-only dependencies
        run: |
          rm -rf node_modules
          npm ci --omit=dev
        shell: bash
        if: runner.os != 'Windows'

      - name: Reinstall production-only dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          Remove-Item -Recurse -Force node_modules
          npm ci --omit=dev
        shell: pwsh

      - name: Create package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          PKG_DIR="${{ matrix.artifact }}"
          TAR_NAME="${{ matrix.artifact }}-${VERSION}.tar.gz"

          mkdir -p "$PKG_DIR/src/web/client"

          # Copy compiled output
          cp -r dist "$PKG_DIR/"
          cp -r src/web/client/dist "$PKG_DIR/src/web/client/"

          # Copy production node_modules
          cp -r node_modules "$PKG_DIR/"

          # Remove unnecessary files to reduce size
          find "$PKG_DIR/node_modules" -type f \( -name "*.md" -o -name "*.txt" -o -name "CHANGELOG*" -o -name "HISTORY*" -o -name ".npmignore" -o -name ".eslintrc*" -o -name ".prettierrc*" \) -delete 2>/dev/null || true
          find "$PKG_DIR/node_modules" -type d \( -name "test" -o -name "tests" -o -name "__tests__" -o -name "example" -o -name "examples" -o -name "docs" -o -name ".github" \) -exec rm -rf {} + 2>/dev/null || true

          # Copy config and scripts
          cp package.json "$PKG_DIR/"
          cp start.sh "$PKG_DIR/"
          chmod +x "$PKG_DIR/start.sh"
          cp README.md "$PKG_DIR/"
          cp LICENSE "$PKG_DIR/"

          # Create tar.gz
          tar -czf "$TAR_NAME" "$PKG_DIR"

          SIZE_MB=$(du -m "$TAR_NAME" | cut -f1)
          echo "Created $TAR_NAME (${SIZE_MB} MB)"
          echo "ASSET_NAME=$TAR_NAME" >> $GITHUB_ENV

      - name: Create package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $pkgDir = "${{ matrix.artifact }}"
          $zipName = "${{ matrix.artifact }}-$version.zip"

          New-Item -ItemType Directory -Path $pkgDir -Force | Out-Null

          # Copy compiled output
          Copy-Item -Path "dist" -Destination "$pkgDir/dist" -Recurse
          New-Item -ItemType Directory -Path "$pkgDir/src/web/client" -Force | Out-Null
          Copy-Item -Path "src/web/client/dist" -Destination "$pkgDir/src/web/client/dist" -Recurse

          # Copy production node_modules
          Copy-Item -Path "node_modules" -Destination "$pkgDir/node_modules" -Recurse

          # Remove unnecessary files to reduce size
          Get-ChildItem -Path "$pkgDir/node_modules" -Recurse -Include "*.md","*.txt","CHANGELOG*","HISTORY*",".npmignore",".eslintrc*",".prettierrc*" -File | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path "$pkgDir/node_modules" -Recurse -Directory -Include "test","tests","__tests__","example","examples","docs",".github" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          # Copy config and scripts
          Copy-Item -Path "package.json" -Destination "$pkgDir/"
          Copy-Item -Path "start.bat" -Destination "$pkgDir/"
          Copy-Item -Path "create-shortcut.ps1" -Destination "$pkgDir/"
          Copy-Item -Path "README.md" -Destination "$pkgDir/"
          Copy-Item -Path "LICENSE" -Destination "$pkgDir/"

          Compress-Archive -Path $pkgDir -DestinationPath $zipName -Force

          $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Created $zipName ($sizeMB MB)"
          "ASSET_NAME=$zipName" | Out-File -Append $env:GITHUB_ENV -Encoding utf8

      - name: Upload package to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_NAME }}
          fail_on_unmatched_files: true

  build-electron-windows:
    name: Build Windows Desktop (Setup .exe + Portable .zip)
    runs-on: windows-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        shell: pwsh
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Build Windows Portable
        shell: pwsh
        run: .\build-portable.ps1

      - name: Create Portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "Axon-Windows-Portable-${version}.zip"
          Compress-Archive -Path "release\axon-portable" -DestinationPath $zipName -Force
          $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Created $zipName ($sizeMB MB)"

      - name: Build Setup .exe with Inno Setup
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $appVersion = $version.TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$appVersion" "installer.iss"
          if (Test-Path "Axon-Setup.exe") {
            $sizeMB = [math]::Round((Get-Item "Axon-Setup.exe").Length / 1MB, 1)
            Write-Host "Created Axon-Setup.exe ($sizeMB MB)"
          } else {
            Write-Error "Inno Setup output not found: Axon-Setup.exe"
            exit 1
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Axon-Windows-Portable-${{ github.ref_name }}.zip
            Axon-Setup.exe
          fail_on_unmatched_files: true

  build-electron-macos:
    name: Build macOS Installer (.dmg)
    runs-on: macos-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Reinstall production-only dependencies
        run: |
          # Save Electron.app before removing devDependencies
          cp -R node_modules/electron/dist/Electron.app /tmp/Electron.app
          rm -rf node_modules
          npm ci --omit=dev
          # Restore Electron.app for build-macos.sh
          mkdir -p node_modules/electron/dist
          cp -R /tmp/Electron.app node_modules/electron/dist/

      - name: Build macOS .app and .dmg
        run: |
          chmod +x build-macos.sh
          ./build-macos.sh

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Find signing identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | grep -o '"[^"]*"' | tr -d '"')
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "Found signing identity: $IDENTITY"

      - name: Sign the .app bundle
        run: |
          APP_DIR="release/axon-macos/Axon.app"
          ENTITLEMENTS="electron/entitlements.plist"
          echo "Signing with identity: $SIGNING_IDENTITY"
          echo "Entitlements: $ENTITLEMENTS"

          # Remove broken symlinks inside the app (node_modules may have dangling links)
          find "$APP_DIR" -type l ! -exec test -e {} \; -delete 2>/dev/null || true

          # Find and sign ALL Mach-O binaries with entitlements
          # Entitlements grant JIT (for V8), unsigned executable memory, and library validation bypass
          echo "Signing all Mach-O binaries..."
          find "$APP_DIR" -type f | while read f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --force --options runtime \
                --sign "$SIGNING_IDENTITY" \
                --timestamp \
                --entitlements "$ENTITLEMENTS" \
                "$f" 2>/dev/null || true
            fi
          done

          # Sign all .framework bundles with entitlements
          find "$APP_DIR/Contents/Frameworks" -name "*.framework" -maxdepth 1 2>/dev/null | while read fw; do
            codesign --force --options runtime \
              --sign "$SIGNING_IDENTITY" \
              --timestamp \
              --entitlements "$ENTITLEMENTS" \
              "$fw" 2>/dev/null || true
          done

          # Sign the main app bundle last with entitlements
          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            --entitlements "$ENTITLEMENTS" \
            "$APP_DIR"

          # Verify signature
          codesign --verify --strict "$APP_DIR"
          echo "Signature verified OK"

          # Show entitlements for verification
          codesign -d --entitlements - "$APP_DIR" 2>/dev/null || true

      - name: Re-create signed DMG
        run: |
          # Remove unsigned DMG, rebuild with signed .app
          rm -f release/Axon-Setup.dmg
          DMG_STAGING="release/dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          cp -R release/axon-macos/Axon.app "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create -volname "Axon" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            release/Axon-Setup.dmg
          rm -rf "$DMG_STAGING"

          # Sign the DMG itself
          codesign --force --sign "$SIGNING_IDENTITY" --timestamp release/Axon-Setup.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # Submit for notarization and capture the submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit release/Axon-Setup.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID and check result
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "Notarization failed. Fetching detailed log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              notarization-log.json 2>/dev/null || true
            cat notarization-log.json 2>/dev/null || true
            echo "WARNING: Notarization failed, uploading unsigned DMG"
          else
            # Staple the notarization ticket to the DMG
            xcrun stapler staple release/Axon-Setup.dmg
            echo "Notarization complete and stapled"
          fi

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/Axon-Setup.dmg
          fail_on_unmatched_files: true

  build-electron-linux:
    name: Build Linux Installer (.AppImage)
    runs-on: ubuntu-22.04
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libfuse2 file

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd src/web/client
          npm install
          npm run build

      - name: Reinstall production-only dependencies
        run: |
          # Save Electron dist before removing devDependencies
          cp -R node_modules/electron/dist /tmp/electron-dist
          rm -rf node_modules
          npm ci --omit=dev
          # Restore Electron dist for build-linux.sh
          mkdir -p node_modules/electron
          cp -R /tmp/electron-dist node_modules/electron/dist

      - name: Build Linux AppImage
        run: |
          chmod +x build-linux.sh
          ./build-linux.sh

      - name: Upload AppImage to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/Axon-Setup.AppImage
          fail_on_unmatched_files: true
