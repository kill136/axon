<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Axon WebUI</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#6366f1">
  <meta name="background-color" content="#030712">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- PWA 优化 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Axon">

  <!-- 禁止自动识别电话号码等（防止聊天内容被误识别） -->
  <meta name="format-detection" content="telephone=no">

  <!-- D3.js for CallGraphViz -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 全局终端图片粘贴拦截（在所有 React 组件之前注册） -->
  <script>
  (function() {
    console.log('[AXON] Global paste handler registered');
    document.addEventListener('paste', function(e) {
      console.log('[AXON] Paste event captured, items:', e.clipboardData ? e.clipboardData.items.length : 0);
      if (!e.clipboardData) return;
      var items = Array.from(e.clipboardData.items);
      var imageItem = items.find(function(item) { return item.type.indexOf('image/') === 0; });
      if (!imageItem) {
        console.log('[AXON] No image item found');
        return;
      }
      console.log('[AXON] Image found:', imageItem.type);

      // 检查焦点是否在终端区域（xterm 的 textarea）
      var target = document.activeElement;
      console.log('[AXON] Active element:', target ? target.tagName + '.' + target.className : 'null');
      var inTerminal = target && (
        target.closest('.xterm') ||
        target.closest('.terminal-instance') ||
        target.closest('[class*="terminal"]') ||
        (target.tagName === 'TEXTAREA' && target.closest('.xterm'))
      );
      console.log('[AXON] inTerminal:', !!inTerminal);
      if (!inTerminal) return;

      e.preventDefault();
      e.stopImmediatePropagation();

      var blob = imageItem.getAsFile();
      console.log('[AXON] blob:', blob ? blob.size + ' bytes' : 'null');
      if (!blob) return;

      var reader = new FileReader();
      reader.onload = function() {
        var dataUrl = reader.result;
        var base64 = dataUrl.split(',')[1];
        console.log('[AXON] base64 length:', base64 ? base64.length : 0);
        console.log('[AXON] __axonTerminalPasteImage registered:', !!window.__axonTerminalPasteImage);
        if (window.__axonTerminalPasteImage) {
          window.__axonTerminalPasteImage(base64, imageItem.type);
          console.log('[AXON] Image sent to terminal handler');
        } else {
          console.warn('[AXON] No terminal paste handler registered');
        }
      };
      reader.onerror = function() {
        console.error('[AXON] FileReader error:', reader.error);
      };
      reader.readAsDataURL(blob);
    }, true);
  })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
