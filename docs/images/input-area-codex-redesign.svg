  <text x="112" y="1032" fill="#F8FAFC" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">结构原则</text>
  <text x="112" y="1072" fill="#D4DAE6" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="600">1. 首层只保留高频动作，其他全部后撤一层。</text>
  <text x="112" y="1102" fill="#D4DAE6" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="600">2. 文字输入区必须占最大视觉权重，不能被图标包围。</text>
  <text x="112" y="1132" fill="#D4DAE6" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="600">3. Context / API / 调试信息保留，但改为次级可见，不长期霸占底栏。</text>

  <text x="900" y="1032" fill="#F8FAFC" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700">实现时不动的能力</text>
  <text x="900" y="1072" fill="#D4DAE6" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="600">附件上传、模型切换、思考强度、模式预设、语音、发送、停止。</text>
  <text x="900" y="1102" fill="#D4DAE6" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="600">只是改信息层级，不砍真实能力；便于基于现有 `InputArea.tsx` 渐进实现。</text>
  <text x="900" y="1132" fill="#8EA0B8" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="500">v1 先收敛结构，视觉细节可在落地时再微调深浅主题。</text>
